<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c">
      <circle cx="32" cy="32" r="30" />
    </clipPath>
  </defs>

  <!-- Circular headshot favicon -->
  <image
    href="./media/photos/Headshot.png"
    xlink:href="./media/photos/Headshot.png"
    x="0"
    y="0"
    width="64"
    height="64"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#c)"
  />

  <!-- Subtle ring so it reads on dark tabs -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2" />
</svg>

