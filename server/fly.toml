# fly.toml app configuration file generated for server-wild-snowflake-9195 on 2026-03-27T15:27:59-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'server-wild-snowflake-9195'
primary_region = 'dfw'

[build]

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

# Volumes attach 1:1 to Machines. If the dashboard shows a volume with no Machine,
# you usually have more Machines than volumes (default HA = 2). Fix: `fly scale count 1`
# then `fly deploy`, or create a second volume in the same region with the same name.
# Volume region must match `primary_region` (and where you ran `fly volumes create`).

[env]
  SOUNDCLOUD_USER_TOKEN_FILE = "/data/soundcloud-user-tokens.json"

[mounts]
  source = "soundcloud_tokens"
  destination = "/data"